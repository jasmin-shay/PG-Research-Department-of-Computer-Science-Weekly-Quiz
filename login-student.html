<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Quizify — Student Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04040d;font-family:'Inter',sans-serif;color:#edf2ff;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:hidden}
#cv{position:fixed;inset:0;z-index:0;pointer-events:none}
.z{position:relative;z-index:10}
.back{position:fixed;top:20px;left:24px;z-index:100;font-family:'Cinzel',serif;font-size:.72rem;
  font-weight:600;letter-spacing:1px;color:rgba(237,242,255,.5);border:1px solid rgba(255,255,255,.08);
  border-radius:8px;padding:8px 14px;cursor:pointer;transition:all .2s;text-decoration:none;
  background:rgba(4,4,13,.7);backdrop-filter:blur(10px)}
.back:hover{color:#06b6d4;border-color:rgba(6,182,212,.4)}
.wrap{width:100%;max-width:420px}
.role-badge{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;text-align:center}
.role-icon-wrap{width:80px;height:80px;border-radius:24px;
  background:linear-gradient(135deg,rgba(6,182,212,.2),rgba(124,58,237,.15));
  border:2px solid rgba(6,182,212,.4);box-shadow:0 0 40px rgba(6,182,212,.2);
  display:flex;align-items:center;justify-content:center;font-size:2.6rem;margin-bottom:16px}
.role-title{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,#06b6d4,#7c3aed);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.role-sub{font-size:.8rem;color:rgba(237,242,255,.45);margin-top:6px;letter-spacing:.5px}
.card{background:rgba(255,255,255,.05);backdrop-filter:blur(24px);
  border:1px solid rgba(6,182,212,.2);border-radius:24px;padding:36px}
/* TABS */
.tabs{display:flex;gap:8px;margin-bottom:24px;background:rgba(255,255,255,.04);
  border-radius:12px;padding:4px}
.tab{flex:1;padding:10px;border:none;border-radius:9px;cursor:pointer;
  font-family:'Cinzel',serif;font-size:.75rem;font-weight:700;letter-spacing:1px;
  background:none;color:rgba(237,242,255,.45);transition:all .2s}
.tab.active{background:linear-gradient(135deg,#06b6d4,#0891b2);color:#fff;
  box-shadow:0 4px 14px rgba(6,182,212,.25)}
.fg{margin-bottom:16px}
.fg label{display:block;font-family:'Cinzel',serif;font-size:.7rem;font-weight:700;
  letter-spacing:1.5px;color:rgba(237,242,255,.45);text-transform:uppercase;margin-bottom:8px}
.fg input,.fg select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:11px;padding:13px 16px;color:#edf2ff;font-family:'Inter',sans-serif;
  font-size:.9rem;outline:none;transition:all .2s}
.fg input:focus,.fg select:focus{border-color:#06b6d4;box-shadow:0 0 0 3px rgba(6,182,212,.12)}
.fg select option{background:#1a1a2e}
.btn{width:100%;padding:14px;border:none;border-radius:12px;cursor:pointer;
  font-family:'Cinzel',serif;font-weight:700;font-size:.88rem;letter-spacing:2px;
  background:linear-gradient(135deg,#06b6d4,#0891b2);color:#fff;
  box-shadow:0 4px 24px rgba(6,182,212,.3);transition:all .2s;margin-top:6px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(6,182,212,.4);filter:brightness(1.08)}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:9px;
  padding:10px 14px;font-size:.82rem;color:#fca5a5;margin-bottom:14px;display:none}
.suc{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:9px;
  padding:10px 14px;font-size:.82rem;color:#6ee7b7;margin-bottom:14px;display:none}
.demo{margin-top:20px;background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.18);
  border-radius:14px;padding:16px}
.demo-title{font-family:'Cinzel',serif;font-size:.62rem;font-weight:700;letter-spacing:2px;
  color:#06b6d4;text-transform:uppercase;margin-bottom:10px}
.demo-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s;
  border-bottom:1px solid rgba(255,255,255,.05)}
.demo-row:last-child{border-bottom:none}
.demo-row:hover{background:rgba(255,255,255,.05)}
.demo-lbl{font-family:'Cinzel',serif;font-size:.7rem;color:#06b6d4;font-weight:600}
.demo-cred{font-family:monospace;font-size:.72rem;color:rgba(237,242,255,.4)}
.ft{text-align:center;margin-top:28px;font-size:.7rem;color:rgba(237,242,255,.22);line-height:1.7}
.ft strong{color:rgba(237,242,255,.35);font-family:'Cinzel',serif}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<a href="quizify-login.html" class="back z">← Change Role</a>
<div class="wrap z">
  <div class="role-badge">
    <div class="role-icon-wrap">🎓</div>
    <div class="role-title">Student Portal</div>
    <div class="role-sub">Open to all departments — Nilgiri College</div>
  </div>
  <div class="card">
    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="fLogin">
      <div class="err" id="lErr"></div>
      <div class="fg"><label>Email Address</label><input id="lEm" type="email" placeholder="your@email.com" autocomplete="email"/></div>
      <div class="fg"><label>Password</label><input id="lPw" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
      <button class="btn" onclick="doLogin()">🎓 &nbsp;Enter Student Portal</button>
      <div class="demo">
        <div class="demo-title">⚡ Demo Credentials</div>
        <div class="demo-row" onclick="fill('jasmin@quizify.edu','stu12345')">
          <span class="demo-lbl">Student Account</span>
          <span class="demo-cred">jasmin@quizify.edu / stu12345</span>
        </div>
      </div>
    </div>

    <!-- SIGNUP FORM -->
    <div id="fSignup" style="display:none">
      <div class="err" id="sErr"></div>
      <div class="suc" id="sSuc"></div>
      <div class="fg"><label>Full Name</label><input id="sName" placeholder="Your full name"/></div>
      <div class="fg"><label>Email Address</label><input id="sEm" type="email" placeholder="your@email.com"/></div>
      <div class="fg"><label>Department</label>
        <select id="sDept">
          <option value="">Select your department</option>
          <option>Computer Science</option><option>Mathematics</option><option>Physics</option>
          <option>Chemistry</option><option>Electronics</option><option>Commerce</option>
          <option>English</option><option>Tamil</option><option>Biotechnology</option>
        </select>
      </div>
      <div class="fg"><label>Password</label><input id="sPw" type="password" placeholder="Minimum 6 characters"/></div>
      <button class="btn" onclick="doSignup()">✨ &nbsp;Create Account</button>
    </div>
  </div>
  <div class="ft"><strong>Quizify Student Portal</strong><br>Organised by PG & Research Dept of CS &nbsp;·&nbsp; Nilgiri College &nbsp;·&nbsp; NAAC A++</div>
</div>

<script>
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
const rsz=()=>{cv.width=innerWidth;cv.height=innerHeight};rsz();window.addEventListener('resize',rsz);
const B=[{x:.1,y:.3,r:.5,c:'#06b6d4',vx:.00018,vy:.00015},{x:.9,y:.6,r:.48,c:'#7c3aed',vx:-.00015,vy:.00020},{x:.5,y:.85,r:.38,c:'#06b6d4',vx:.00022,vy:-.00018}];
(function a(){cx.clearRect(0,0,cv.width,cv.height);cx.fillStyle='#04040d';cx.fillRect(0,0,cv.width,cv.height);
B.forEach(b=>{b.x+=b.vx;b.y+=b.vy;if(b.x<0||b.x>1)b.vx*=-1;if(b.y<0||b.y>1)b.vy*=-1;
const g=cx.createRadialGradient(b.x*cv.width,b.y*cv.height,0,b.x*cv.width,b.y*cv.height,b.r*Math.max(cv.width,cv.height));
g.addColorStop(0,b.c+'2e');g.addColorStop(1,'transparent');cx.fillStyle=g;cx.fillRect(0,0,cv.width,cv.height);});
requestAnimationFrame(a);})();

function ensureDB(){
  let db=JSON.parse(localStorage.getItem('quizify_db')||'null');
  if(!db||!db._seeded){
    if(!db)db={};
    if(!db.users)db.users=[
      {id:'admin1',name:'Dr. Darlon',email:'admin@quizify.edu',pass:'admin123',role:'admin',dept:'Computer Science',badge:'gold'},
      {id:'teach1',name:'Prof. Anita',email:'teacher@quizify.edu',pass:'teach123',role:'teacher',dept:'Physics'},
      {id:'stu1',name:'Jasmin',email:'jasmin@quizify.edu',pass:'stu12345',role:'student',dept:'Computer Science',badge:'silver'},
    ];
    if(!db.quizzes)db.quizzes=[];if(!db.attempts)db.attempts=[];
    if(!db.registrations)db.registrations=[];if(!db.notifications)db.notifications=[];
    if(!db.weeklyResults)db.weeklyResults={};if(!db.deptUsage)db.deptUsage={};
    if(!db.winners)db.winners=[];db._seeded=true;
    localStorage.setItem('quizify_db',JSON.stringify(db));
  }
  return db;
}
function switchTab(t){
  document.getElementById('tabLogin').classList.toggle('active',t==='login');
  document.getElementById('tabSignup').classList.toggle('active',t==='signup');
  document.getElementById('fLogin').style.display=t==='login'?'block':'none';
  document.getElementById('fSignup').style.display=t==='signup'?'block':'none';
}
function doLogin(){
  const em=document.getElementById('lEm').value.trim().toLowerCase();
  const pw=document.getElementById('lPw').value;
  if(!em||!pw){showErr('lErr','Please enter your email and password.');return}
  const db=ensureDB();
  const u=(db.users||[]).find(x=>x.email.toLowerCase()===em&&x.pass===pw);
  if(!u){showErr('lErr','Incorrect email or password.');return}
  if(u.role!=='student'){showErr('lErr','This is the Student portal. Please use the '+u.role+' login page.');return}
  sessionStorage.setItem('quizify_session',JSON.stringify(u));
  location.href='quizify.html#/student';
}
function doSignup(){
  const name=document.getElementById('sName').value.trim();
  const em=document.getElementById('sEm').value.trim().toLowerCase();
  const dept=document.getElementById('sDept').value;
  const pw=document.getElementById('sPw').value;
  if(!name||!em||!dept||!pw){showErr('sErr','Please fill in all fields.');return}
  if(pw.length<6){showErr('sErr','Password must be at least 6 characters.');return}
  const db=ensureDB();
  if((db.users||[]).some(u=>u.email.toLowerCase()===em)){showErr('sErr','An account with this email already exists.');return}
  const nu={id:'u'+Date.now(),name,email:em,pass:pw,role:'student',dept,badge:null};
  db.users.push(nu);localStorage.setItem('quizify_db',JSON.stringify(db));
  document.getElementById('sSuc').textContent='Account created! Signing you in…';
  document.getElementById('sSuc').style.display='block';
  sessionStorage.setItem('quizify_session',JSON.stringify(nu));
  setTimeout(()=>location.href='quizify.html#/student',1500);
}
function showErr(id,m){const e=document.getElementById(id);e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',4000)}
function fill(e,p){document.getElementById('lEm').value=e;document.getElementById('lPw').value=p}
document.addEventListener('keydown',e=>{if(e.key==='Enter'){if(document.getElementById('fLogin').style.display!=='none')doLogin();else doSignup();}});
const ses=JSON.parse(sessionStorage.getItem('quizify_session')||'null');
if(ses&&ses.role==='student')location.href='quizify.html#/student';
</script>
<script src="api.js"></script>  
</body>
</html>
